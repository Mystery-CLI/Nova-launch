# ClusterIP services — Istio sidecars handle mTLS between them.
# Ports are named (http/tcp) so Istio can apply L7 policies.
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: nova-launch
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: nova-launch
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: nova-launch
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
# Redis — tcp port (no L7 policy needed)
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: nova-launch
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - name: tcp-redis
      port: 6379
      targetPort: 6379
