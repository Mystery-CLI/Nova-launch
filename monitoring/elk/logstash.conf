##############################################################################
# Logstash Pipeline Configuration — Nova Launch
# Issue: #894 — ELK Stack Log Aggregation
#
# Ingests structured JSON logs from the Nova Launch backend (stdout/file),
# enriches them, and ships to Elasticsearch.
##############################################################################

input {
  # ── Docker container logs via Filebeat ──────────────────────────────────────
  beats {
    port => 5044
    ssl  => false
  }

  # ── Direct TCP input for local dev ──────────────────────────────────────────
  tcp {
    port  => 5000
    codec => json_lines
  }

  # ── File input (non-production / CI) ────────────────────────────────────────
  file {
    path           => ["/var/log/nova/*.log", "/app/logs/*.log"]
    start_position => "beginning"
    sincedb_path   => "/var/lib/logstash/sincedb"
    codec          => json
    tags           => ["file-input"]
  }
}

filter {
  # ── Parse JSON if not already parsed ────────────────────────────────────────
  if [message] and ![level] {
    json {
      source => "message"
      target => "parsed"
    }
    if "_jsonparsefailure" not in [tags] {
      ruby {
        code => "
          parsed = event.get('parsed')
          if parsed.is_a?(Hash)
            parsed.each { |k, v| event.set(k, v) }
          end
          event.remove('parsed')
        "
      }
    }
  }

  # ── Timestamp normalisation ──────────────────────────────────────────────────
  if [@timestamp] {
    date {
      match    => ["@timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS"]
      target   => "@timestamp"
      timezone => "UTC"
    }
  }

  # ── Enrich with environment metadata ────────────────────────────────────────
  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "nova-launch"
      "app"                       => "nova-launch"
    }
    # Normalise log level to lowercase
    lowercase => ["level"]
  }

  # ── Map log levels to numeric severity ──────────────────────────────────────
  translate {
    field       => "level"
    destination => "severity"
    dictionary  => {
      "error"   => "3"
      "warn"    => "2"
      "warning" => "2"
      "info"    => "1"
      "http"    => "1"
      "debug"   => "0"
      "verbose" => "0"
    }
    fallback => "1"
  }

  # ── Security event enrichment ────────────────────────────────────────────────
  if [category] == "security" {
    mutate {
      add_tag   => ["security-event"]
      add_field => { "alert" => "true" }
    }
  }

  # ── Contract interaction enrichment ─────────────────────────────────────────
  if [category] == "contract" {
    mutate { add_tag => ["blockchain"] }
  }

  # ── Drop noisy health-check logs in production ───────────────────────────────
  if [url] =~ "/health" and [statusCode] == 200 {
    drop {}
  }

  # ── GeoIP enrichment for IP addresses ───────────────────────────────────────
  if [ipAddress] and [ipAddress] !~ "^(10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.)" {
    geoip {
      source => "ipAddress"
      target => "geoip"
    }
  }

  # ── Remove internal/noisy fields ────────────────────────────────────────────
  mutate {
    remove_field => ["host", "agent", "ecs", "input", "log", "tags"]
  }
}

output {
  # ── Primary: Elasticsearch ──────────────────────────────────────────────────
  elasticsearch {
    hosts    => ["${ELASTICSEARCH_HOST:elasticsearch}:${ELASTICSEARCH_PORT:9200}"]
    index    => "nova-launch-%{environment}-%{+YYYY.MM.dd}"
    user     => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:changeme}"

    # ILM policy for log retention
    ilm_enabled      => true
    ilm_rollover_alias => "nova-launch"
    ilm_pattern      => "{now/d}-000001"
    ilm_policy       => "nova-launch-policy"
  }

  # ── Security events: separate high-priority index ───────────────────────────
  if "security-event" in [tags] {
    elasticsearch {
      hosts    => ["${ELASTICSEARCH_HOST:elasticsearch}:${ELASTICSEARCH_PORT:9200}"]
      index    => "nova-security-%{+YYYY.MM.dd}"
      user     => "${ELASTICSEARCH_USER:elastic}"
      password => "${ELASTICSEARCH_PASSWORD:changeme}"
    }
  }

  # ── Debug: stdout in dev ─────────────────────────────────────────────────────
  if "${LOGSTASH_DEBUG:false}" == "true" {
    stdout { codec => rubydebug }
  }
}
