name: Multi-Stage CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Stage 1: Build & Lint Gate
  build-and-lint:
    name: Build & Lint Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install Soroban CLI
        run: |
          cargo install --locked soroban-cli --features opt
      
      - name: Format Check
        run: cargo fmt --all -- --check
        working-directory: contracts/token-factory
      
      - name: Clippy Check
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: contracts/token-factory
      
      - name: Build Contracts
        run: |
          cargo build --target wasm32-unknown-unknown --release
          soroban contract optimize --wasm target/wasm32-unknown-unknown/release/token_factory.wasm
        working-directory: contracts/token-factory

  # Stage 2: Security Audit (OWASP Standards)
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
      
      - name: Vulnerability Scan
        run: cargo audit
        working-directory: contracts/token-factory
      
      - name: Static Analysis
        run: |
          # Check for common Soroban pitfalls
          echo "Running static analysis..."
          
          # Check for unsafe code blocks
          if grep -r "unsafe" contracts/token-factory/src/; then
            echo "❌ Unsafe code detected - review required"
            exit 1
          fi
          
          # Check for hardcoded secrets
          if grep -r -i "secret\|password\|key" contracts/token-factory/src/ --exclude-dir=test; then
            echo "❌ Potential hardcoded secrets detected"
            exit 1
          fi
          
          # Check for panic! usage
          if grep -r "panic!" contracts/token-factory/src/; then
            echo "❌ panic! usage detected - use Result<T, Error> instead"
            exit 1
          fi
          
          echo "✅ Static analysis passed"

  # Stage 3: Testing & Coverage
  test-and-coverage:
    name: Testing & Coverage
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      
      - name: Run Tests
        run: cargo test --all-features
        working-directory: contracts/token-factory
      
      - name: Generate Coverage Report
        run: |
          cargo tarpaulin --all-features --workspace --timeout 120 --out xml --output-dir coverage/
        working-directory: contracts/token-factory
      
      - name: Check Coverage Threshold
        run: |
          coverage=$(grep -o 'line-rate="[^"]*"' contracts/token-factory/coverage/cobertura.xml | head -1 | grep -o '[0-9.]*')
          coverage_percent=$(echo "$coverage * 100" | bc -l | cut -d. -f1)
          echo "Coverage: ${coverage_percent}%"
          
          if [ "$coverage_percent" -lt 90 ]; then
            echo "❌ Coverage ${coverage_percent}% is below 90% threshold"
            exit 1
          fi
          
          echo "✅ Coverage ${coverage_percent}% meets 90% threshold"
      
      - name: Upload Coverage
        uses: codecov/codecov-action@v6
        with:
          file: contracts/token-factory/coverage/cobertura.xml
          fail_ci_if_error: true

  # Stage 4a: Testnet Deployment
  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: test-and-coverage
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: testnet
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli --features opt
      
      - name: Build Contract
        run: |
          cargo build --target wasm32-unknown-unknown --release
          soroban contract optimize --wasm target/wasm32-unknown-unknown/release/token_factory.wasm
        working-directory: contracts/token-factory
      
      - name: Configure Soroban Network
        run: |
          soroban network add testnet \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015"
      
      - name: Deploy to Testnet
        env:
          SOROBAN_NETWORK_PASSPHRASE: ${{ secrets.TESTNET_NETWORK_PASSPHRASE }}
          SOROBAN_RPC_URL: ${{ secrets.TESTNET_RPC_URL }}
          ADMIN_SECRET_KEY: ${{ secrets.TESTNET_ADMIN_SECRET_KEY }}
          TREASURY_SECRET_KEY: ${{ secrets.TESTNET_TREASURY_SECRET_KEY }}
        run: |
          echo "$ADMIN_SECRET_KEY" | soroban keys add admin --stdin
          echo "$TREASURY_SECRET_KEY" | soroban keys add treasury --stdin
          
          # Deploy using deployment orchestrator
          cd scripts/deployment
          npm install
          npm run deploy -- --network testnet
          
          echo "✅ Testnet deployment completed"

  # Stage 4b: Mainnet Deployment (Manual Approval)
  deploy-mainnet:
    name: Deploy to Mainnet
    runs-on: ubuntu-latest
    needs: test-and-coverage
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: mainnet
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli --features opt
      
      - name: Build Contract
        run: |
          cargo build --target wasm32-unknown-unknown --release
          soroban contract optimize --wasm target/wasm32-unknown-unknown/release/token_factory.wasm
        working-directory: contracts/token-factory
      
      - name: Configure Soroban Network
        run: |
          soroban network add mainnet \
            --rpc-url https://soroban-mainnet.stellar.org \
            --network-passphrase "Public Global Stellar Network ; September 2015"
      
      - name: Deploy to Mainnet
        env:
          SOROBAN_NETWORK_PASSPHRASE: ${{ secrets.MAINNET_NETWORK_PASSPHRASE }}
          SOROBAN_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          ADMIN_SECRET_KEY: ${{ secrets.MAINNET_ADMIN_SECRET_KEY }}
          TREASURY_SECRET_KEY: ${{ secrets.MAINNET_TREASURY_SECRET_KEY }}
        run: |
          echo "$ADMIN_SECRET_KEY" | soroban keys add admin --stdin
          echo "$TREASURY_SECRET_KEY" | soroban keys add treasury --stdin
          
          # Deploy using deployment orchestrator
          cd scripts/deployment
          npm install
          npm run deploy -- --network mainnet
          
          echo "✅ Mainnet deployment completed"
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            🚀 Mainnet deployment completed
            
            **Contract Address**: Check deployment logs
            **Network**: Stellar Mainnet
            **Commit**: ${{ github.sha }}
          draft: false
          prerelease: false