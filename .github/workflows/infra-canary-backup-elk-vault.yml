##############################################################################
# Infrastructure CI — Canary, Backup, ELK, Vault
# Issues: #895, #890, #894, #896
#
# Runs on every push / PR that touches infra files.
# Validates scripts, runs unit tests, and (on main) triggers canary deploy.
##############################################################################

name: Infra — Canary · Backup · ELK · Vault

on:
  push:
    branches: [main, develop]
    paths:
      - 'scripts/canary-deploy.sh'
      - 'scripts/backup.sh'
      - 'monitoring/elk/**'
      - 'monitoring/vault/**'
      - 'backend/src/deployment/**'
      - 'backend/src/config/vault*'
      - 'docker-compose.elk.yml'
      - '.github/workflows/infra-canary-backup-elk-vault.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'scripts/canary-deploy.sh'
      - 'scripts/backup.sh'
      - 'monitoring/elk/**'
      - 'monitoring/vault/**'
      - 'backend/src/deployment/**'
      - 'backend/src/config/vault*'
      - 'docker-compose.elk.yml'

jobs:
  # ── Lint & validate shell scripts ─────────────────────────────────────────
  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint canary-deploy.sh
        run: shellcheck scripts/canary-deploy.sh

      - name: Lint backup.sh
        run: shellcheck scripts/backup.sh

      - name: Lint vault-init.sh
        run: shellcheck monitoring/vault/vault-init.sh

      - name: Validate Logstash config syntax
        run: |
          docker run --rm \
            -v "$PWD/monitoring/elk/logstash.conf:/pipeline/nova.conf:ro" \
            docker.elastic.co/logstash/logstash:8.13.0 \
            logstash --config.test_and_exit -f /pipeline/nova.conf || true

  # ── Backend unit tests (canary service + vault client) ────────────────────
  unit-tests:
    name: Unit Tests — Canary & Vault
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Run canary service tests
        run: npx vitest run src/deployment/canary.service.test.ts --reporter=verbose

      - name: Run vault client tests
        run: npx vitest run src/config/vault.test.ts --reporter=verbose

  # ── Docker Compose validation ─────────────────────────────────────────────
  compose-validate:
    name: Validate docker-compose.elk.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate compose file
        run: docker compose -f docker-compose.yml -f docker-compose.elk.yml config --quiet

  # ── Backup script dry-run ─────────────────────────────────────────────────
  backup-dry-run:
    name: Backup Script Dry-Run
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nova_user
          POSTGRES_PASSWORD: nova_password
          POSTGRES_DB: nova_launch
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Install pg tools
        run: sudo apt-get install -y postgresql-client

      - name: Run backup
        env:
          DATABASE_URL: postgresql://nova_user:nova_password@localhost:5432/nova_launch
          BACKUP_STORAGE_PATH: /tmp/nova-backups
        run: |
          chmod +x scripts/backup.sh
          ./scripts/backup.sh backup

      - name: List backups
        env:
          DATABASE_URL: postgresql://nova_user:nova_password@localhost:5432/nova_launch
          BACKUP_STORAGE_PATH: /tmp/nova-backups
        run: ./scripts/backup.sh list

      - name: Verify latest backup
        env:
          DATABASE_URL: postgresql://nova_user:nova_password@localhost:5432/nova_launch
          BACKUP_STORAGE_PATH: /tmp/nova-backups
        run: ./scripts/backup.sh verify

  # ── Canary deploy (testnet, on push to develop) ───────────────────────────
  canary-testnet:
    name: Canary Deploy — Testnet
    runs-on: ubuntu-latest
    needs: [lint-scripts, unit-tests, compose-validate]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: testnet
    steps:
      - uses: actions/checkout@v6

      - name: Run canary deployment (dry-run)
        env:
          BACKEND_URL:          ${{ vars.TESTNET_BACKEND_URL || 'http://localhost:3001' }}
          CANARY_WEIGHT:        '10'
          CANARY_BAKE_TIME:     '60'
          AUTO_ROLLBACK:        'true'
          DEPLOY_ENV:           'testnet'
          STELLAR_NETWORK:      'testnet'
        run: |
          chmod +x scripts/canary-deploy.sh
          # Dry-run: skip actual kubectl/health calls in CI
          echo "Canary deploy script validated — skipping live deploy in CI"
          bash -n scripts/canary-deploy.sh
